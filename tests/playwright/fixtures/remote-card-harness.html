<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Remote Card Harness</title>
    <style>
      :root {
        color-scheme: light;
        --primary-color: #4c78a8;
        --primary-text-color: #202124;
        --secondary-text-color: #56708b;
        --disabled-text-color: #bfccd9;
        --divider-color: #d8d8d8;
        --ha-card-border-radius: 18px;
        --ha-card-background: #ffffff;
        --card-background-color: #ffffff;
        --primary-background-color: #fafafa;
        --secondary-background-color: #ffffff;
        --input-fill-color: #f4f4f4;
        --warning-color: #cf9b2f;
        --error-color: #d96a6a;
        --rgb-primary-color: 76, 120, 168;
        --rgb-primary-text-color: 32, 33, 36;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 8px 0 24px;
        background: #f6f6f6;
        color: var(--primary-text-color);
        font-family: Roboto, "Segoe UI", Arial, sans-serif;
      }

      #mount {
        width: 460px;
        margin: 0 auto;
        display: block;
      }

      #mount > sofabaton-virtual-remote {
        display: block;
        width: 100%;
      }

      hui-button-card {
        display: block;
        width: 100%;
        height: 100%;
        --ha-card-background: #ffffff;
        --ha-card-border-width: 1px;
        --ha-card-border-color: #dbdbdb;
        --ha-card-border-radius: 22px;
        --ha-card-box-shadow: none;
      }

      hui-button-card .button-card-main {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: 100%;
        height: 100%;
        min-height: 100%;
        min-width: 0;
        padding: 0 10px;
        border-radius: var(--ha-card-border-radius);
        border: var(--ha-card-border-width) solid var(--ha-card-border-color);
        background: var(--ha-card-background);
        box-shadow: var(--ha-card-box-shadow);
        color: inherit;
        font: inherit;
        text-align: center;
      }

      hui-button-card .button-card-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.2em;
        height: 1.2em;
        line-height: 1;
        color: var(--primary-color);
      }

      hui-button-card .button-card-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      ha-card {
        display: block;
        background: #fff;
        border-radius: var(--ha-card-border-radius);
        border: 1px solid #dbdbdb;
        box-shadow:
          0 1px 2px rgba(0, 0, 0, 0.06),
          0 12px 24px rgba(0, 0, 0, 0.04);
      }
    </style>
  </head>
  <body>
    <div id="mount"></div>
    <script type="module" src="/tests/playwright/fixtures/remote-card-harness.js"></script>
  </body>
  </html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Remote Card Harness</title>
    <style>
      :root {
        color-scheme: light;
        --primary-color: #4c78a8;
        --primary-text-color: #202124;
        --secondary-text-color: #56708b;
        --disabled-text-color: #bfccd9;
        --divider-color: #d8d8d8;
        --ha-card-border-radius: 18px;
        --ha-card-background: #ffffff;
        --card-background-color: #ffffff;
        --primary-background-color: #fafafa;
        --secondary-background-color: #ffffff;
        --input-fill-color: #f4f4f4;
        --warning-color: #cf9b2f;
        --error-color: #d96a6a;
        --rgb-primary-color: 76, 120, 168;
        --rgb-primary-text-color: 32, 33, 36;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 8px 0 24px;
        background: #f6f6f6;
        color: var(--primary-text-color);
        font-family: Roboto, "Segoe UI", Arial, sans-serif;
      }

      #mount {
        width: 460px;
        margin: 0 auto;
        display: block;
      }

      #mount > sofabaton-virtual-remote {
        display: block;
        width: 100%;
      }

      /* hui-button-card and ha-card style themselves (shadow stubs in
         remote-card-harness.js), matching the real self-styling HA elements
         so both the light-DOM legacy card and the shadow-DOM Lit card render
         identically. */
    </style>
  </head>
  <body>
    <div id="mount"></div>
    <script type="module" src="/tests/playwright/fixtures/remote-card-harness.js"></script>
  </body>
  </html>

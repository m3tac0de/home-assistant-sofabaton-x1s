# Release pipeline for the standalone sofapython library.
#
# Trigger: push a tag named sofapython-vX.Y.Z (after bumping
# custom_components/sofabaton_x1s/lib/version.py to X.Y.Z — the
# verify-version step refuses mismatched tags).
#
# Publishing uses PyPI trusted publishing (OIDC): no tokens or secrets.
# One-time setup on pypi.org -> Publishing -> pending publisher:
#   project sofapython, owner m3tac0de, repo home-assistant-sofabaton-x1s,
#   workflow sofapython-release.yml, environment pypi.
name: sofapython release

on:
  push:
    tags:
      - "sofapython-v*"

jobs:
  test:
    name: test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: npm ci
      - run: pip install pytest
      - name: Library tests (boundary lint, discovery, aio, public API)
        run: pytest tests/lib -q
      - name: Full integration suite
        run: pytest tests -q

  build:
    name: build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Verify tag matches lib/version.py
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#sofapython-v}"
          PKG_VERSION="$(sed -n 's/^__version__ = "\(.*\)"$/\1/p' custom_components/sofabaton_x1s/lib/version.py)"
          echo "tag=$TAG_VERSION package=$PKG_VERSION"
          test -n "$PKG_VERSION"
          test "$TAG_VERSION" = "$PKG_VERSION"
      - run: pip install build
      - run: python -m build
      - name: Install wheel and smoke-test
        run: |
          pip install dist/*.whl
          python -c "import sofapython; assert all(hasattr(sofapython, n) for n in sofapython.__all__); print('OK', sofapython.__version__)"
          sofapython --help
      - uses: actions/upload-artifact@v4
        with:
          name: sofapython-dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: [test, build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/sofapython/
    permissions:
      id-token: write  # OIDC for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: sofapython-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

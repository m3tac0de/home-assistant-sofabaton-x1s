# CI for the standalone sofabaton-x library (custom_components/sofabaton_x1s/lib,
# published via the root pyproject.toml). Runs on every change that can affect
# the published package: library boundary lint, lib tests across supported
# Python versions, full suite, and a build + install smoke test of the wheel.
name: sofabaton-x CI

on:
  pull_request:
    paths:
      - "custom_components/sofabaton_x1s/lib/**"
      - "sofabaton-x/**"
      - "pyproject.toml"
      - "tests/**"
      - ".github/workflows/sofabaton-x-ci.yml"
  push:
    branches: [main, dev]
    paths:
      - "custom_components/sofabaton_x1s/lib/**"
      - "sofabaton-x/**"
      - "pyproject.toml"
      - ".github/workflows/sofabaton-x-ci.yml"

jobs:
  lib-tests:
    name: lib tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor matches requires-python in pyproject.toml.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest
      - name: Boundary lint + library tests
        run: pytest tests/lib -q

  full-suite:
    name: full integration suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: npm ci
      - run: pip install pytest
      - name: Full pytest suite
        run: pytest tests -q

  build-smoke:
    name: build + install smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install build
      - name: Build sdist and wheel
        run: python -m build
      - name: Install wheel and smoke-test the public API
        run: |
          pip install dist/*.whl
          python -c "
          import sofabaton
          missing = [n for n in sofabaton.__all__ if not hasattr(sofabaton, n)]
          assert not missing, missing
          from sofabaton import X1Proxy, AsyncX1Proxy, discover_hubs
          print('sofabaton', sofabaton.__version__, 'OK:', len(sofabaton.__all__), 'public names')
          "
      - name: Console script smoke test
        run: |
          sofabaton --help
          sofabaton discover --timeout 0.1 --json
      - uses: actions/upload-artifact@v6
        with:
          name: sofabaton-x-dist
          path: dist/

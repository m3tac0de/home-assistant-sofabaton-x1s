name: Bug report
description: Report something that is broken in the Home Assistant integration or sofapython
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Please share what you can; logs and version details are helpful, but do not worry if you cannot collect everything.

        If you are using the standalone `sofapython` package, Home Assistant diagnostics and `switch.<hub>_hex_logging` do not apply.
  - type: dropdown
    id: affected_area
    attributes:
      label: What are you using?
      description: Pick the closest option.
      options:
        - Home Assistant integration
        - Standalone sofapython package / CLI
        - Documentation
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: hub_model
    attributes:
      label: Hub model
      description: Select your hub model if relevant.
      options:
        - X1
        - X1S
        - X2
        - Unknown / not sure
        - Not hub-specific
    validations:
      required: false
  - type: input
    id: versions
    attributes:
      label: Versions
      description: Share any versions you know. Examples include integration version, Home Assistant version, sofapython version, Python version, hub firmware, or install method.
      placeholder: "Example: HA 2026.6.1, integration v1.2.3, sofapython 0.4.0, Python 3.12, HACS install"
    validations:
      required: false
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the issue, what you expected, and what actually happened.
      placeholder: |
        I was trying to...
        I expected...
        Instead...
    validations:
      required: true
  - type: textarea
    id: reproduction_steps
    attributes:
      label: Steps to reproduce
      description: If you can reproduce it, list the steps. A short description is fine.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs, diagnostics, or terminal output
      description: Optional, but very useful. Remove secrets, tokens, IPs, and anything private before posting.
      placeholder: |
        Home Assistant users:
        - If possible, enable switch.<hub>_hex_logging, reproduce the issue, then download diagnostics from the integration card.
        - See docs/logging.md for the detailed workflow.

        sofapython users:
        - Paste the command you ran, traceback, terminal output, or a small Python snippet that reproduces the issue.
        - If discovery/proxying is involved, include whether the official app was connected and what mode you expected: observe or control.
    validations:
      required: false
  - type: textarea
    id: additional_context
    attributes:
      label: Anything else?
      description: Screenshots, YAML snippets, links, network/VLAN details, or other context that might help.
      placeholder: Add any extra context here.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Home Assistant logging help: [docs/logging.md](../../docs/logging.md)

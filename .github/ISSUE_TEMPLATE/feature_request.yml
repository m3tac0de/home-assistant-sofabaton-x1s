name: Feature request
description: Suggest an enhancement for the Home Assistant integration, sofapython, or the docs
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea. A clear use case helps most, but short requests are welcome too.
  - type: dropdown
    id: affected_area
    attributes:
      label: What should this improve?
      options:
        - Home Assistant integration
        - Standalone sofapython package / CLI
        - Documentation
        - Hub compatibility
        - Not sure
    validations:
      required: true
  - type: dropdown
    id: hub_model
    attributes:
      label: Hub model
      description: Select your hub model if the request depends on one.
      options:
        - X1
        - X1S
        - X2
        - Unknown / not sure
        - Not hub-specific
    validations:
      required: false
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Short description of the feature or improvement you want.
      placeholder: "Example: Support configuring button repeat rate per device"
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: What problem does this solve, or what would it let you do?
      placeholder: |
        I want to...
        This helps when...
    validations:
      required: false
  - type: textarea
    id: desired_behavior
    attributes:
      label: Desired behavior
      description: Describe how you expect it to work. Include UI, service, CLI, API, or documentation ideas if relevant.
      placeholder: |
        When I...
        I expect...
    validations:
      required: false
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Links, screenshots, logs, examples from other projects, or anything else that helps.
      placeholder: Add any extra context here.

fetch_device_commands:
  name: Fetch commands for device/activity
  description: Fetch (and cache) commands for this activity/device so they appear on the diagnostic sensor.
  fields:
    device:
      name: Sofabaton hub
      required: true
      selector:
        device:
          integration: sofabaton_x1s
    ent_id:
      name: Activity or device id
      required: true
      selector:
        number:
          min: 1
          max: 255
          mode: box

create_wifi_device:
  name: Create Wifi Device
  description: Creates a Wifi device on the selected hub.
  fields:
    device:
      name: Sofabaton hub
      required: true
      selector:
        device:
          integration: sofabaton_x1s
    device_name:
      name: Device name
      description: Name that the Wifi device will be given on the hub.
      required: true
      default: Home Assistant
      selector:
        text:
    commands:
      name: Custom commands
      description: Required list of 1 to 10 custom command names to map into the Wifi emulated app slots. Names may contain letters, numbers, and spaces. For X1S and X2 hubs unicode (accented and umlaut characters) is supported.
      required: true
      selector:
        object:
    power_on_command_id:
      name: Power on command id
      description: Optional command id from the configured command list to use as the device power-on command. Use values 1 through 10, where 1 is the first command in `commands`.
      required: false
      selector:
        number:
          min: 1
          max: 10
          mode: box
    power_off_command_id:
      name: Power off command id
      description: Optional command id from the configured command list to use as the device power-off command. Use values 1 through 10, where 1 is the first command in `commands`.
      required: false
      selector:
        number:
          min: 1
          max: 10
          mode: box
    input_command_ids:
      name: Input command ids
      description: Optional ordered list of command positions from `commands` to register as device input switchers on X1 hubs. These are command-list positions, not discovered hub command ids.
      required: false
      selector:
        object:
create_ip_button:
  name: Create virtual IP button
  description: Create a virtual HTTP device/button on the hub based on an IP command definition.
  fields:
    device:
      name: Sofabaton hub
      required: false
      selector:
        device:
          integration: sofabaton_x1s
    hub:
      name: Hub entry id or MAC (optional)
      required: false
      selector:
        text:
    entity_id:
      name: Related entity
      required: false
      selector:
        entity:
          integration: sofabaton_x1s
    device_name:
      name: Device name
      description: Name shown for the virtual device on the hub.
      required: true
      selector:
        text:
    device_id:
      name: Existing device id
      description: Optional hub device id to append the button to instead of creating a new device.
      required: false
      selector:
        number:
          min: 1
          max: 255
          mode: box
    button_name:
      name: Button name
      description: Label for the HTTP command.
      required: true
      selector:
        text:
    url:
      name: Request URL
      description: Full HTTP URL for the command.
      required: true
      selector:
        text:
    method:
      name: HTTP method
      required: true
      default: GET
      selector:
        select:
          options:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - HEAD
            - OPTIONS
    headers:
      name: Headers
      description: Optional HTTP headers to include (key/value mapping).
      required: false
      selector:
        object:

device_to_activity:
  name: Add device to activity
  description: Adds a device to an activity on the selected hub.
  fields:
    device:
      name: Sofabaton hub
      required: true
      selector:
        device:
          integration: sofabaton_x1s
    activity_id:
      name: Activity id
      required: true
      selector:
        number:
          min: 101
          max: 200
          mode: box
    device_id:
      name: Device id
      required: true
      selector:
        number:
          min: 1
          max: 99
          mode: box
    input_command_id:
      name: Input command id
      description: Optional command id to set as the device input when it powers on (X1 hubs only). Use the same command id as defined in create_wifi_device or discovered via the diagnostic sensor.
      required: false
      selector:
        number:
          min: 1
          max: 255
          mode: box

delete_device:
  name: Delete device
  description: Deletes a device and confirms all impacted activities on the selected hub.
  fields:
    device:
      name: Sofabaton hub
      required: true
      selector:
        device:
          integration: sofabaton_x1s
    device_id:
      name: Device id
      required: true
      selector:
        number:
          min: 1
          max: 255
          mode: box

command_to_favorite:
  name: Add command to activity favorite
  description: Makes a favorite from a command on the selected hub.
  fields:
    device:
      name: Sofabaton hub
      required: true
      selector:
        device:
          integration: sofabaton_x1s
    activity_id:
      name: Activity id
      required: true
      selector:
        number:
          min: 101
          max: 255
          mode: box
    device_id:
      name: Device id
      required: true
      selector:
        number:
          min: 1
          max: 99
          mode: box
    command_id:
      name: Command id
      required: true
      selector:
        number:
          min: 1
          max: 255
          mode: box
    slot_id:
      name: Favorite slot id
      description: Optional slot/index value to store in the favorite mapping payload.
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 255
          mode: box

command_to_button:
  name: Map command to activity button
  description: Maps commands to buttons on the selected hub.
  fields:
    device:
      name: Sofabaton hub
      required: true
      selector:
        device:
          integration: sofabaton_x1s
    activity_id:
      name: Activity id
      required: true
      selector:
        number:
          min: 1
          max: 255
          mode: box
    button_id:
      name: Activity button id
      description: Physical button code in the keymap (for example 182 for VOL_UP, 193 for BLUE).
      required: true
      selector:
        number:
          min: 1
          max: 255
          mode: box
    device_id:
      name: Device id
      required: true
      selector:
        number:
          min: 1
          max: 255
          mode: box
    command_id:
      name: Command id
      required: true
      selector:
        number:
          min: 1
          max: 255
          mode: box
    long_press_device_id:
      name: Long press device id
      description: Device id for the long-press action. Must be used together with long_press_command_id.
      required: false
      selector:
        number:
          min: 1
          max: 255
          mode: box
    long_press_command_id:
      name: Long press command id
      description: Command id for the long-press action. Must be used together with long_press_device_id.
      required: false
      selector:
        number:
          min: 1
          max: 255
          mode: box


sync_command_config:
  name: Sync command configuration
  description: Deploys persisted command-slot configuration to the hub by recreating the managed Wifi device and applying activity mappings.
  fields:
    device:
      name: Sofabaton hub
      required: true
      selector:
        device:
          integration: sofabaton_x1s
    device_name:
      name: Device name
      description: Optional Wifi device name; defaults to Home Assistant.
      required: false
      default: Home Assistant
      selector:
        text:

get_favorites:
  name: Get activity favorites
  description: Fetches the current ordered quick-access list from the hub for the given activity. The response may contain both favorites and macros, each with its shared hub-order id, display slot, type, and best-known label.
  fields:
    device:
      name: Sofabaton hub
      required: true
      selector:
        device:
          integration: sofabaton_x1s
    activity_id:
      name: Activity id
      required: true
      selector:
        number:
          min: 101
          max: 255
          mode: box

reorder_favorites:
  name: Reorder activity favorites
  description: Reorders the favorites of an activity on the hub. Provide the hub-order fav_ids in the desired new order.
  fields:
    device:
      name: Sofabaton hub
      required: true
      selector:
        device:
          integration: sofabaton_x1s
    activity_id:
      name: Activity id
      required: true
      selector:
        number:
          min: 101
          max: 255
          mode: box
    ordered_fav_ids:
      name: Ordered favorite ids
      description: List of hub-order fav_id values in the desired display order (use get_favorites to retrieve them).
      required: true
      selector:
        object:

delete_favorite:
  name: Delete activity favorite
  description: Deletes a single favorite from an activity on the hub.
  fields:
    device:
      name: Sofabaton hub
      required: true
      selector:
        device:
          integration: sofabaton_x1s
    activity_id:
      name: Activity id
      required: true
      selector:
        number:
          min: 101
          max: 255
          mode: box
    fav_id:
      name: Favorite id
      description: The hub-order fav_id of the favorite to delete (use get_favorites to retrieve it).
      required: true
      selector:
        number:
          min: 1
          max: 255
          mode: box
